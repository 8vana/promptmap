# PromptMap – Browser Target Configuration Example
#
# This file describes how PromptMap should navigate to a web application
# and interact with an embedded LLM chat interface.
#
# Workflow:
#   1. Copy this file and edit it for your target application.
#   2. Use `playwright codegen <url>` to record navigation steps and
#      identify CSS selectors automatically.
#   3. Set the path to this file in PromptMap's Settings → Browser Config Path.
#
# Install Playwright browsers (first-time setup):
#   pip install playwright
#   playwright install chromium

# ── Browser engine ────────────────────────────────────────────────────────────
# Options: chromium (default), firefox, webkit
browser: chromium

# Set headless: false to watch the browser window while PromptMap is running.
headless: true

# ── Navigation steps ──────────────────────────────────────────────────────────
# These steps are executed once at startup to reach the chat interface.
# Supported actions:
#   goto              : navigate to a URL
#   fill              : type text into an input field
#   click             : click an element
#   wait_for_selector : wait until an element appears in the DOM
#   wait_for_url      : wait until the URL matches a glob pattern
#   select            : choose a <select> dropdown option
#   press             : press a keyboard key (e.g. "Enter", "Tab")
#   set_extra_http_headers : inject HTTP headers for all subsequent requests
#                            (use for pre-obtained Bearer JWT tokens)
#   evaluate          : execute JavaScript in the browser context
#                       (use for localStorage / sessionStorage manipulation)

navigation:
  # ── Example: login form ───────────────────────────────────────────────────
  - action: goto
    url: "https://example.com/login"

  - action: fill
    selector: "#username"
    value: "your-username"

  - action: fill
    selector: "#password"
    value: "your-password"

  - action: click
    selector: "button[type='submit']"

  # Wait for the dashboard to load after login
  - action: wait_for_url
    pattern: "**/dashboard"

  # ── Example: navigate to the embedded chat page ───────────────────────────
  - action: click
    selector: "a[href='/chat']"

  - action: wait_for_selector
    selector: "#chat-input"

  # ── Optional: inject a pre-obtained Bearer token ──────────────────────────
  # Uncomment if the chat API requires an Authorization header that is NOT
  # automatically set by the application's JavaScript.
  #
  # - action: set_extra_http_headers
  #   headers:
  #     Authorization: "Bearer eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9..."

  # ── Optional: write a token into localStorage ─────────────────────────────
  # Uncomment if the application reads the token from localStorage.
  #
  # - action: evaluate
  #   expression: "localStorage.setItem('access_token', 'eyJhbGci...')"

# ── Chat interface configuration ──────────────────────────────────────────────
# Describes where to type prompts and how to read the AI's responses.
chat:
  # CSS selector for the chat text input field
  input_selector: "#chat-input"

  # CSS selector for the send button.
  # Omit (or set to null) to press Enter on the input field instead.
  send_selector: "#send-button"

  # CSS selector that matches each assistant response message element.
  # PromptMap reads the last element matching this selector after each send.
  response_selector: ".message.assistant"

  # Maximum time (ms) to wait for a response before timing out.
  # Increase this value for targets with slow LLM inference or async polling.
  response_timeout: 30000

  # How to detect when the AI has finished responding:
  #
  #   new_element   – wait until a new DOM element matching response_selector
  #                   appears. Works for both synchronous HTTP responses and
  #                   asynchronous patterns (polling / WebSocket / SSE) where
  #                   the response is appended as a new element.
  #
  #   content_stable – wait until the last matching element's text stops
  #                    changing for 1.5 seconds. Use this for streaming /
  #                    typewriter UIs where the response updates incrementally.
  response_wait_strategy: "new_element"

  # Optional: CSS selector for a button that starts a fresh conversation.
  # Uncomment if you need to reset the chat between attack runs.
  # reset_selector: "#new-chat-button"

converter_type: native
description: Native converter implementations — no PyRIT dependency
converters:
 - name: None
   description: コンバーターを使用しない。
 - name: AnsiAttackConverter
   description: ANSI 制御文字（カラーコードやカーソル移動シーケンス）をランダムに挿入し、ログ解析系を混乱させる。
 - name: AsciiSmugglerConverter
   description: 文字を Unicode Tags ブロック（U+E0000）にマッピングし、可視フィルターをすり抜ける不可視テキストを生成する。
 - name: AtbashConverter
   description: 古典的な Atbash 暗号（A↔Z、a↔z、0↔9）でアルファベットを逆順マッピング。
 - name: Base64Converter
   description: プロンプトを Base64 文字列にエンコードし、ペイロードを隠す。
 - name: BinaryConverter
   description: 各文字を 16 ビットバイナリ（0/1）で表現し、デコーダーエラーや奇妙なパーシングを誘発。
 - name: CaesarConverter
   description: 任意のシフト量で古典的シーザー暗号をかける（デフォルト shift=3）。
 - name: CharSwapGenerator
   description: 単語内の隣接文字をランダムに入れ替え、スペリングチェックや正規表現フィルターをすり抜ける。
 - name: CharacterSpaceConverter
   description: 文字間にスペースを挿入し句読点を除去することで、分類器の境界検出を混乱させる。
 - name: ColloquialWordswapConverter
   description: 一部の英単語をシンガポール英語（Singlish）の口語表現に置き換え、正規表現ベースのフィルタをすり抜ける。
 - name: EmojiConverter
   description: 英字を丸囲み・四角囲みの絵文字文字（🅰️ など）に置き換える。外部ライブラリ不要の組み込み辞書を使用。
 - name: FlipConverter
   description: プロンプト全体を逆順に並べ替える。"hello me" → "em olleh"
 - name: InsertPunctuationConverter
   description: 単語間または単語内にランダムに句読点を挿入し、フィルタを欺く。
 - name: LeetspeakConverter
   description: 文字を数字や記号で代替する「1337」書き換え（e→3, a→4, o→0 など）。
 - name: MorseConverter
   description: テキストをモールス符号に変換する（スペースで文字区切り、/ で単語区切り）。
 - name: NoiseConverter
   description: プロンプトにランダムな記号文字を挿入し、シグネチャベースの検出を回避する。
 - name: ROT13Converter
   description: アルファベットを 13 文字分シフトする簡易暗号。
 - name: RandomCapitalLettersConverter
   description: 指定割合でランダムに大文字を混ぜ、正規化処理をすり抜ける（デフォルト 25%）。
 - name: RepeatTokenConverter
   description: 特定のトークンを N 回繰り返してプロンプトに付加し、アテンション操作やリソース消費を誘発。
 - name: SearchReplaceConverter
   description: 正規表現による検索・置換ルールに基づいてプロンプトを動的変換。
 - name: StringJoinConverter
   description: 各文字をセパレータで連結し、パーサーの境界検出を混乱させる（例: t-e-s-t）。
 - name: SuffixAppendConverter
   description: プロンプトの末尾に定型サフィックスを付与し、プロンプトガードをバイパス。
 - name: TextToHexConverter
   description: テキストを UTF-8 バイトの大文字16進数表現に変換する。
 - name: UrlConverter
   description: プロンプトを URL エンコード（パーセントエンコーディング）する。
 - name: ZeroWidthConverter
   description: 全文字間にゼロ幅スペース（U+200B）を挿入し、見た目は同一だが内部構造が異なるテキストを生成する。
